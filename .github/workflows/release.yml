name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+" # 1.0.0 などのタグがプッシュされた時に実行
  workflow_dispatch: # 手動実行用

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: macos-arm64
            suffix: ""
          - os: ubuntu-latest
            target: linux-x64
            suffix: ""
          - os: windows-latest
            target: windows-x64
            suffix: ".exe"
          - os: ubuntu-latest
            target: linux-musl-x64
            suffix: ""
            use_musl: true

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Swift Setup (Non-Windows)
    - name: Setup Swift (macOS / Linux)
      if: runner.os != 'Windows'
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: '6.2'

    # Swift Setup (Windows)
    - name: Setup Swift (Windows)
      if: runner.os == 'Windows'
      uses: sushichop/gha-swift-env@v1
      with:
        swift-version: '6.2'

    # musl 用の特別なセットアップ
    - name: Install Static Linux SDK for musl
      if: ${{ matrix.use_musl }}
      run: swift sdk install https://download.swift.org/swift-6.2-release/static-sdk/swift-6.2-RELEASE/swift-6.2-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz --checksum d2225840e592389ca517bbf71652f7003dbf45ac35d1e57d98b9250368769378

    # ビルド実行
    - name: Build Library
      run: |
        if [ "${{ matrix.use_musl }}" = "true" ]; then
          swift build -c release --target yes --swift-sdk x86_64-swift-linux-musl
          # musl環境下で生成された実行ファイルを探す
          BINARY_PATH=$(find .build -type f -name "yes" | grep "release" | grep "musl" | head -n 1)
        elif [ "${{ runner.os }}" = "Windows" ]; then
          swift build -c release --target yes
          # Windows の場合は .exe を探す (PowerShell/Bash混合環境を考慮して shell: bash を維持)
          BINARY_PATH=$(find .build -type f -name "yes.exe" | grep "release" | head -n 1)
        else
          swift build -c release --target yes
          # macOS / Linux で release ディレクトリ内の実行ファイルを探す
          BINARY_PATH=$(find .build -type f -perm +111 -name "yes" | grep "release" | head -n 1)
          # perm +111 が効かない環境（古いfind）の場合は以下を試行
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find .build -type f -name "yes" | grep "release" | head -n 1)
          fi
        fi

        echo "Found binary at: $BINARY_PATH"
        
        if [ -z "$BINARY_PATH" ]; then
          echo "Error: Binary not found"
          exit 1
        fi

        cp "$BINARY_PATH" "./yes-${{ matrix.target }}${{ matrix.suffix }}"
      shell: bash

    # 成果物の保存
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: yes-${{ matrix.target }}
        path: yes-${{ matrix.target }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Nightly Build' }}
          prerelease: ${{ github.ref_type != 'tag' }}
          files: ./artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}